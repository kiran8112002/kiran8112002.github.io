<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- =====BOX ICONS===== -->
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/contact.css">

        <title>Contact - Kiran Mahadew</title>
    </head>
    <body>

        <!--===== HEADER =====-->
        <header class="l-header">
            <nav class="nav bd-grid">
                <div>
                    <a href="https://www.facebook.com/kiran.mahadew.14" target="_blank" class="nav__logo">😊😊Kiran Mahadew😊😊</a>
                </div>

                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index.html#home" class="nav__link">Home</a></li>
                        <li class="nav__item"><a href="about.html#about" class="nav__link">About</a></li>
                        <li class="nav__item"><a href="work.html" class="nav__link">Work</a></li>
                        <li class="nav__item"><a href="contact.html" class="nav__link active-link">Contact</a></li>
                    </ul>
                </div>

                <div class="nav__toggle" id="nav-toggle">
                    <i class='bx bx-menu'></i>
                </div>
            </nav>
        </header>

        <main class="l-main">

            <!--===== CONTACT =====-->
            <section class="contact section" id="contact">
                <h2 class="section-title">Contact</h2>
                <span class="contact__subtitle">Got a project or an idea? Let's talk.</span>

                <div class="contact__status">
                    <span class="contact__status-dot"></span>
                    Available for freelance work
                </div>

                <div class="contact__container bd-grid">

                    <a href="mailto:ki.mahadew@unasat.sr" class="contact__card" id="contact-email" data-email="ki.mahadew@unasat.sr">
                        <span class="contact__copy-hint">Click to copy</span>
                        <div class="contact__icon"><i class='bx bx-envelope'></i></div>
                        <h3 class="contact__label">Email</h3>
                        <p class="contact__value">ki.mahadew@unasat.sr</p>
                    </a>

                    <a href="https://www.facebook.com/kiran.mahadew.14" target="_blank" class="contact__card">
                        <div class="contact__icon"><i class='bx bxl-facebook'></i></div>
                        <h3 class="contact__label">Facebook</h3>
                        <p class="contact__value">Kiran Mahadew</p>
                    </a>

                    <a href="https://www.instagram.com/mahadewkiran?igsh=NGR0eHc1OWQ4MGN4" target="_blank" class="contact__card">
                        <div class="contact__icon"><i class='bx bxl-instagram'></i></div>
                        <h3 class="contact__label">Instagram</h3>
                        <p class="contact__value">@mahadewkiran</p>
                    </a>

                </div>

                <div class="contact__fly-zone" aria-hidden="true">
                    <svg viewBox="0 0 800 160" preserveAspectRatio="none">
                        <path id="flight-path" class="contact__fly-path" pathLength="100"
                              d="M 20,120 C 180,20 320,150 480,60 S 700,20 780,90" />
                        <path class="contact__fly-progress" pathLength="100"
                              d="M 20,120 C 180,20 320,150 480,60 S 700,20 780,90">
                            <animate attributeName="stroke-dashoffset" values="100;0" keyTimes="0;1" dur="9s" repeatCount="indefinite" />
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="9s" repeatCount="indefinite" />
                        </path>
                        <g class="contact__mail">
                            <g transform="translate(-10,-7)">
                                <rect class="contact__mail-body" x="0" y="0" width="20" height="14" rx="2" />
                                <path class="contact__mail-flap" d="M1,1 L10,8 L19,1" />
                            </g>
                            <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
                                <mpath href="#flight-path" />
                            </animateMotion>
                            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="9s" repeatCount="indefinite" />
                        </g>
                    </svg>
                </div>
            </section>

            <div class="contact__toast" id="contact-toast">Email copied to clipboard ✓</div>

        </main>

        <!--===== FOOTER =====-->
        <footer class="footer">
            <p class="footer__copy">&#169; Mahadew.K(Only9km). All rigths reserved</p>
        </footer>

        <!--===== SCROLL REVEAL =====-->
        <script src="https://unpkg.com/scrollreveal"></script>

        <!--===== MAIN JS =====-->
        <script src="js/main.js"></script>

        <!--===== CONTACT JS =====-->
        <script src="js/contact.js"></script>
    </body>
</html>
